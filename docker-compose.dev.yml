# =============================================
# AgroFlete - Docker Compose (Desarrollo)
# =============================================
# Solo levanta la infraestructura (DB + Redis)
# El backend corre localmente con hot-reload
#
# Uso: docker compose -f docker-compose.dev.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: agroflete_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: agroflete
      POSTGRES_USER: agroflete_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroflete_user -d agroflete"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agroflete_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
